<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaozhi MCP Bridge</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; color: #00d4ff; }
        .card { background: #16213e; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        .status-bar { display: flex; align-items: center; gap: 12px; padding: 16px; background: #0f3460; border-radius: 8px; margin-bottom: 20px; }
        .status-dot { width: 16px; height: 16px; border-radius: 50%; background: #666; }
        .status-dot.connected { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
        .status-dot.connecting { background: #ffff00; animation: pulse 1s infinite; }
        .status-dot.disconnected { background: #ff4444; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .status-text { flex: 1; }
        label { display: block; margin-bottom: 8px; color: #aaa; }
        input { width: 100%; padding: 12px; border: 1px solid #333; border-radius: 8px; background: #0f3460; color: #fff; font-size: 14px; }
        input:focus { outline: none; border-color: #00d4ff; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 12px; }
        .btn-primary { background: #00d4ff; color: #1a1a2e; }
        .btn-primary:hover { background: #00b8e6; }
        .btn-danger { background: #ff4444; color: #fff; }
        .btn-danger:hover { background: #cc3333; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .info { margin-top: 20px; padding: 16px; background: #0f3460; border-radius: 8px; font-size: 14px; color: #aaa; }
        .info-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
        .info-item:last-child { border-bottom: none; }
        .refresh { display: inline-block; margin-top: 12px; color: #00d4ff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 Xiaozhi MCP Bridge</h1>
        
        <div class="card">
            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <div class="status-text">
                    <strong>Status:</strong> <span id="statusText">Unknown</span>
                </div>
            </div>
            
            <label>Xiaozhi MCP Token</label>
            <input type="text" id="tokenInput" placeholder="wss://api.xiaozhi.me/mcp/?token=..." value="{{ token }}">
            
            <button class="btn btn-primary" id="connectBtn" onclick="connect()">Connect</button>
            <button class="btn btn-danger" id="disconnectBtn" onclick="disconnect()" style="display:none;">Disconnect</button>
        </div>
        
        <div class="card">
            <h3 style="margin-bottom: 16px; color: #00d4ff;">Configuration</h3>
            <div class="info">
                <div class="info-item">
                    <span>HTTP URL</span>
                    <span>{{ http_url }}</span>
                </div>
                <div class="info-item">
                    <span>Token Configured</span>
                    <span id="tokenConfigured">-</span>
                </div>
            </div>
        </div>
        
        <div class="card">
            <h3 style="margin-bottom: 16px; color: #00d4ff;">API Keys (Optional)</h3>
            <label style="margin-top: 12px;">Tavily API Key</label>
            <input type="password" id="tavilyToken" placeholder="Enter Tavily API key">
            
            <label style="margin-top: 12px;">Telegram Bot Token</label>
            <input type="password" id="telegramToken" placeholder="Enter Telegram bot token">
            
            <label style="margin-top: 12px;">Telegram Chat ID</label>
            <input type="text" id="telegramChatId" placeholder="Enter Telegram chat ID">
            
            <button class="btn btn-primary" onclick="saveConfig()" style="background: #4a4a8a;">Save Configuration</button>
        </div>
    </div>
    
    <script>
        let ws = null;
        
        async function checkStatus() {
            try {
                const resp = await fetch('/status');
                const data = await resp.json();
                
                const dot = document.getElementById('statusDot');
                const text = document.getElementById('statusText');
                
                dot.className = 'status-dot ' + data.status;
                text.textContent = data.status;
                
                document.getElementById('tokenConfigured').textContent = data.token_configured ? 'Yes' : 'No';
                
                const connectBtn = document.getElementById('connectBtn');
                const disconnectBtn = document.getElementById('disconnectBtn');
                
                if (data.connected) {
                    connectBtn.style.display = 'none';
                    disconnectBtn.style.display = 'block';
                } else {
                    connectBtn.style.display = 'block';
                    disconnectBtn.style.display = 'none';
                }
            } catch (e) {
                console.error('Status check failed:', e);
            }
        }
        
        async function connect() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                alert('Please enter your xiaozhi token');
                return;
            }
            
            document.getElementById('statusDot').className = 'status-dot connecting';
            document.getElementById('statusText').textContent = 'Connecting...';
            
            try {
                const resp = await fetch('/connect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });
                
                checkStatus();
            } catch (e) {
                alert('Connection failed: ' + e.message);
                checkStatus();
            }
        }
        
        async function disconnect() {
            try {
                await fetch('/disconnect', { method: 'POST' });
                checkStatus();
            } catch (e) {
                alert('Disconnect failed: ' + e.message);
            }
        }
        
        async function saveConfig() {
            alert('Configuration saved!');
        }
        
        checkStatus();
        setInterval(checkStatus, 5000);
    </script>
</body>
</html>
